<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4 Haftalık Antrenman Programı</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --card: #181818;
    --border: #2a2a2a;
    --accent: #e8ff00;
    --accent2: #ff4d00;
    --text: #f0f0f0;
    --muted: #666;
    --green: #00e676;
    --red: #ff1744;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  header {
    padding: 32px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    gap: 16px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(32px, 8vw, 56px);
    letter-spacing: 2px;
    line-height: 1;
    color: var(--accent);
  }

  header span {
    font-size: 13px;
    color: var(--muted);
    padding-bottom: 6px;
  }

  .week-tabs {
    display: flex;
    gap: 8px;
    padding: 16px 24px;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid var(--border);
  }

  .week-tab {
    flex-shrink: 0;
    padding: 8px 20px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .week-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 700;
  }

  .week-tab:hover:not(.active) {
    border-color: var(--accent);
    color: var(--accent);
  }

  .day-tabs {
    display: flex;
    gap: 6px;
    padding: 12px 24px;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .day-tab {
    flex-shrink: 0;
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .day-tab.active {
    background: var(--card);
    border-color: var(--accent2);
    color: var(--accent2);
  }

  .day-tab.rest {
    opacity: 0.4;
    pointer-events: none;
  }

  .day-tab.completed {
    border-color: var(--green);
    color: var(--green);
  }

  .content {
    padding: 20px 24px;
    max-width: 800px;
  }

  .day-header {
    margin-bottom: 20px;
  }

  .day-header h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 1px;
    color: var(--text);
  }

  .day-header .focus {
    font-size: 12px;
    color: var(--accent2);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-top: 2px;
  }

  .rest-day {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    gap: 12px;
    color: var(--muted);
    text-align: center;
  }

  .rest-day .icon { font-size: 48px; }
  .rest-day h3 { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 1px; color: var(--border); }

  .exercise-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .exercise-card:hover { border-color: #333; }

  .ex-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    cursor: pointer;
    user-select: none;
  }

  .ex-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--accent);
    min-width: 28px;
    text-align: center;
  }

  .ex-name {
    flex: 1;
    font-weight: 500;
    font-size: 14px;
  }

  .ex-meta {
    font-size: 11px;
    color: var(--muted);
    text-align: right;
  }

  .ex-meta span {
    display: block;
  }

  .ex-body {
    border-top: 1px solid var(--border);
    padding: 14px 16px;
  }

  .sets-grid {
    display: grid;
    grid-template-columns: 40px 1fr 1fr 1fr;
    gap: 6px;
    align-items: center;
  }

  .sets-grid .col-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    text-align: center;
  }

  .set-num {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
  }

  .set-input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 7px 8px;
    text-align: center;
    width: 100%;
    transition: border-color 0.15s;
    -moz-appearance: textfield;
  }

  .set-input::-webkit-outer-spin-button,
  .set-input::-webkit-inner-spin-button { -webkit-appearance: none; }

  .set-input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .set-input.filled {
    border-color: var(--green);
    color: var(--green);
  }

  .ex-note {
    margin-top: 10px;
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
    padding: 6px 10px;
    border-left: 2px solid var(--accent2);
    background: rgba(255,77,0,0.05);
    border-radius: 0 4px 4px 0;
  }

  .complete-btn {
    width: 100%;
    padding: 14px;
    margin-top: 20px;
    background: var(--accent);
    border: none;
    border-radius: 6px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    color: #000;
    cursor: pointer;
    transition: all 0.2s;
  }

  .complete-btn:hover { opacity: 0.85; transform: translateY(-1px); }
  .complete-btn.done {
    background: var(--green);
    color: #000;
  }

  .progress-bar-wrap {
    padding: 0 24px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .progress-bar {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .progress-text {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }

  .expand-toggle {
    font-size: 10px;
    color: var(--muted);
    margin-left: auto;
    padding: 2px 6px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: none;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }

  .expand-toggle:hover { border-color: var(--muted); }

  .hidden { display: none !important; }

  .week-note {
    margin: 0 24px 16px;
    padding: 10px 14px;
    background: rgba(232,255,0,0.05);
    border: 1px solid rgba(232,255,0,0.15);
    border-radius: 6px;
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.3px;
  }

  .stats-row {
    display: flex;
    gap: 10px;
    padding: 12px 24px 4px;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .stat-pill {
    flex-shrink: 0;
    padding: 6px 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 11px;
    color: var(--muted);
  }

  .stat-pill strong {
    color: var(--text);
    font-size: 13px;
    margin-right: 4px;
  }

  .add-ex-btn {
    width: 100%; padding: 12px; margin-top: 8px; margin-bottom: 4px;
    border: 1px dashed var(--border); border-radius: 6px; background: none;
    color: var(--muted); font-family: 'Bebas Neue', sans-serif; font-size: 16px;
    letter-spacing: 1px; cursor: pointer; transition: all 0.2s;
  }
  .add-ex-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  .change-ex-btn {
    font-size: 10px; padding: 3px 8px; border: 1px solid var(--border);
    border-radius: 3px; background: none; color: var(--accent2);
    font-family: 'DM Sans', sans-serif; cursor: pointer; margin-left: 6px;
  }
  .delete-ex-btn {
    font-size: 10px; padding: 3px 7px; border: 1px solid var(--border);
    border-radius: 3px; background: none; color: var(--red);
    font-family: 'DM Sans', sans-serif; cursor: pointer; margin-left: 2px;
  }
  .set-controls {
    display: flex; align-items: center; gap: 8px; margin-top: 10px;
    padding-top: 10px; border-top: 1px solid var(--border);
  }
  .set-ctrl-btn {
    width: 26px; height: 26px; border: 1px solid var(--border); border-radius: 3px;
    background: none; color: var(--muted); cursor: pointer; font-size: 16px; line-height: 1;
    transition: all 0.15s;
  }
  .set-ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }
  .set-count-label { font-size: 12px; color: var(--muted); flex: 1; }
  .prev-kg { font-size: 10px; color: var(--muted); text-align: center; margin-top: 3px; }
  .set-input.pr { border-color: #ffd700 !important; color: #ffd700 !important; }
  .day-note-label {
    font-size: 11px; color: var(--muted); text-transform: uppercase;
    letter-spacing: 1px; margin-top: 20px; margin-bottom: 6px;
  }
  .day-note-area {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 13px; padding: 10px 12px; resize: vertical; min-height: 64px;
  }
  .day-note-area:focus { outline: none; border-color: var(--accent); }
  .weight-hist-btn {
    font-size: 11px; padding: 2px 8px; border: 1px solid var(--border);
    border-radius: 3px; background: none; color: var(--muted);
    font-family: 'DM Sans', sans-serif; cursor: pointer; margin-left: 6px;
  }
  .weight-hist-btn:hover { color: var(--accent); border-color: var(--accent); }
  .weight-chart-wrap { display: flex; align-items: flex-end; gap: 8px; height: 80px; margin-top: 8px; }
  .wc-col { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
  .wc-bar { background: var(--accent); border-radius: 2px 2px 0 0; width: 100%; min-height: 2px; }
  .wc-label { font-size: 9px; color: var(--muted); }
  .wc-val { font-size: 10px; color: var(--text); }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    z-index: 1000; display: flex; align-items: center; justify-content: center;
  }
  .modal-box {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 28px 24px; width: 90%; max-width: 360px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .modal-box--wide { max-width: 560px; max-height: 80vh; overflow: hidden; }
  .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--accent); }
  .modal-input {
    background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px;
    padding: 10px 12px; width: 100%;
  }
  .modal-input:focus { outline: none; border-color: var(--accent); }
  .modal-error { color: var(--red); font-size: 12px; }
  .modal-actions { display: flex; gap: 10px; }
  .modal-actions button {
    flex: 1; padding: 11px; border: 1px solid var(--border); border-radius: 4px;
    background: none; color: var(--text); font-family: 'Bebas Neue', sans-serif;
    font-size: 16px; letter-spacing: 1px; cursor: pointer;
  }
  .modal-actions button:first-child { background: var(--accent); border-color: var(--accent); color: #000; }
  .ex-library-list { overflow-y: auto; max-height: calc(80vh - 160px); display: flex; flex-direction: column; gap: 4px; }
  .ex-library-group { margin-top: 10px; }
  .ex-library-group-title {
    font-size: 10px; text-transform: uppercase; letter-spacing: 2px;
    color: var(--accent2); padding: 4px 0; border-bottom: 1px solid var(--border); margin-bottom: 4px;
  }
  .ex-library-item { padding: 9px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; transition: background 0.15s; }
  .ex-library-item:hover { background: var(--surface); color: var(--accent); }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--green); color: var(--green);
    padding: 10px 20px; border-radius: 20px; font-size: 13px;
    z-index: 2000; opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
</head>

<header>
  <h1>ANTRENMAN <span style="color:var(--accent2)">TAKİP</span></h1>

</div>
<div class="content" id="content"></div>

function getActiveProgram() {
  const saved = localStorage.getItem('custom_program');
  if (saved) { try { return JSON.parse(saved); } catch(e) {} }
  return DEFAULT_PROGRAM;
}
function saveCustomProgram(p) {
  localStorage.setItem('custom_program', JSON.stringify(p));
}

let currentWeek = 0;
let currentDay = 0;
let pendingExChange = null;
// Storage key: "w{week}_d{day}_ex{ex}_s{set}_kg" etc.
function storageKey(w, d, ex, s, type) {
  return `w${w}_d${d}_ex${ex}_s${s}_${type}`;
}

function saveVal(w, d, ex, s, type, val) {
  localStorage.setItem(storageKey(w,d,ex,s,type), val);
}

function loadVal(w, d, ex, s, type) {
  return localStorage.getItem(storageKey(w,d,ex,s,type)) || '';
}

function isDayCompleted(w, d) {
  return localStorage.getItem(`w${w}_d${d}_done`) === '1';
}

function renderWeekTabs() {
  const cont = document.getElementById('weekTabs');
  cont.innerHTML = '';
  getActiveProgram().weeks.forEach((wk, i) => {
    const btn = document.createElement('button');
    btn.className = 'week-tab' + (i === currentWeek ? ' active' : '');
    btn.textContent = wk.label;
    btn.onclick = () => { currentWeek = i; currentDay = 0; render(); };
    cont.appendChild(btn);
  });
}

function renderStats() {
  const row = document.getElementById('statsRow');
  let totalSets = 0, filledSets = 0;
  getActiveProgram().days.forEach((day, d) => {
    if (day.rest) return;
    day.exercises.forEach((ex, e) => {
      for (let s = 0; s < ex.sets; s++) {
        totalSets++;
        if (loadVal(currentWeek, d, e, s, 'kg')) filledSets++;
      }
    });
  });
  const completedDays = getActiveProgram().days.filter((d,i) => !d.rest && isDayCompleted(currentWeek,i)).length;
  const trainDays = getActiveProgram().days.filter(d => !d.rest).length;

  row.innerHTML = `
    <div class="stat-pill"><strong>${completedDays}/${trainDays}</strong>gün tamamlandı</div>
    <div class="stat-pill"><strong>${filledSets}</strong>set kaydedildi</div>
    <div class="stat-pill"><strong>${getActiveProgram().weeks[currentWeek].intensity}</strong></div>
  `;
}

function renderDayTabs() {
  const cont = document.getElementById('dayTabs');
  cont.innerHTML = '';
  getActiveProgram().days.forEach((day, i) => {
    const btn = document.createElement('button');
    let cls = 'day-tab';
    if (day.rest) cls += ' rest';
    else if (isDayCompleted(currentWeek, i)) cls += ' completed';
    if (i === currentDay) cls += ' active';
    btn.className = cls;
    btn.textContent = day.rest ? day.label + ' 💤' : (isDayCompleted(currentWeek,i) ? day.label + ' ✓' : day.label);
    btn.onclick = () => { currentDay = i; renderDayTabs(); renderContent(); renderProgress(); };
    cont.appendChild(btn);
  });
}

function renderProgress() {
  const day = getActiveProgram().days[currentDay];
  if (day.rest) {
    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('progressText').textContent = 'Dinlenme günü';
    return;
  }
  let total = 0, filled = 0;
  day.exercises.forEach((ex, e) => {
    for (let s = 0; s < ex.sets; s++) {
      total++;
      if (loadVal(currentWeek, currentDay, e, s, 'kg')) filled++;
    }
  });
  const pct = total ? Math.round(filled/total*100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${filled} / ${total} set`;
}

function renderContent() {
  const cont = document.getElementById('content');
  const day = getActiveProgram().days[currentDay];
  const w = currentWeek, d = currentDay;

  if (day.rest) {
    cont.innerHTML = `
      <div class="rest-day">
        <div class="icon">😴</div>
        <h3>Dinlenme Günü</h3>
        <p style="color:var(--muted);font-size:13px;max-width:220px;line-height:1.6">Kaslar antrenman sırasında değil, dinlenirken büyür.</p>
      </div>`;
    return;
  }

  let html = `<div class="day-header"><h2>${day.name}</h2><div class="focus">${getActiveProgram().weeks[w].label} · ${day.label}</div></div>`;

  day.exercises.forEach((ex, e) => {
    html += `<div class="exercise-card" id="excard_${e}">
      <div class="ex-header" onclick="toggleEx(${e})">
        <span class="ex-num">${e+1}</span>
        <span class="ex-name">${ex.name}</span>
        <button class="change-ex-btn" onclick="openExPicker(${d},${e});event.stopPropagation()">Değiştir</button>
        <button class="delete-ex-btn" onclick="deleteExercise(${d},${e});event.stopPropagation()">✕</button>
        <div class="ex-meta">
          <span>${ex.sets} Set</span>
          <span>${ex.reps} Tekrar</span>
        </div>
        <button class="expand-toggle" id="toggle_${e}">▼</button>
      </div>
      <div class="ex-body" id="exbody_${e}">
        <div class="sets-grid">
          <div class="col-label">SET</div>
          <div class="col-label">KG</div>
          <div class="col-label">TEKRAR</div>
          <div class="col-label">DURUM</div>`;

    for (let s = 0; s < ex.sets; s++) {
      const kgVal = loadVal(w, d, e, s, 'kg');
      const repVal = loadVal(w, d, e, s, 'rep');
      const done = loadVal(w, d, e, s, 'done');
      const prevKg = w > 0 ? loadVal(w-1, d, e, s, 'kg') : '';
      const pr = kgVal ? isPR(d, e, s, kgVal) : false;
      html += `
          <div class="set-num">${s+1}</div>
          <div>
            <input class="set-input${kgVal ? ' filled':''}${pr ? ' pr':''}" type="number" placeholder="${prevKg ? prevKg : 'kg'}" value="${kgVal}"
              onchange="saveInput(${w},${d},${e},${s},'kg',this)"
              oninput="saveInput(${w},${d},${e},${s},'kg',this)">
            ${prevKg ? `<div class="prev-kg">↑ ${prevKg}kg</div>` : ''}
          </div>
          <input class="set-input${repVal ? ' filled':''}" type="number" placeholder="${ex.reps.split('-')[0]}" value="${repVal}"
            onchange="saveInput(${w},${d},${e},${s},'rep',this)"
            oninput="saveInput(${w},${d},${e},${s},'rep',this)">
          <input class="set-input${done ? ' filled':''}" type="text" placeholder="✓" value="${done}"
            onchange="saveInput(${w},${d},${e},${s},'done',this)"
            oninput="saveInput(${w},${d},${e},${s},'done',this)" readonly
            onclick="toggleDone(${w},${d},${e},${s},this)">`;
    }

    html += `</div>
        <div class="set-controls">
          <button class="set-ctrl-btn" onclick="changeSetCount(${d},${e},-1);event.stopPropagation()">−</button>
          <span class="set-count-label">${ex.sets} Set</span>
          <button class="set-ctrl-btn" onclick="changeSetCount(${d},${e},1);event.stopPropagation()">+</button>
        </div>`;
    if (ex.note) html += `<div class="ex-note">${ex.note}</div>`;
    html += `</div></div>`;
  });

  html += `<button class="add-ex-btn" onclick="openAddExercise(${d})">+ HAREKETİ EKLE</button>`;
  html += `<div class="day-note-label">Gün Notu</div>
  <textarea class="day-note-area" placeholder="Bu antrenman hakkında not al..."
    oninput="saveDayNote(${w},${d},this.value)">${loadDayNote(w,d)}</textarea>`;

  const done = isDayCompleted(w, d);
  html += `<button class="complete-btn${done ? ' done' : ''}" onclick="completeDay(${w},${d})" id="completeBtn">
    ${done ? '✓ GÜN TAMAMLANDI' : 'GÜNÜ TAMAMLA'}
  </button>`;

  cont.innerHTML = html;
}

function toggleEx(e) {
  const body = document.getElementById('exbody_' + e);
  const tog = document.getElementById('toggle_' + e);
  if (body.classList.contains('hidden')) {
    body.classList.remove('hidden');
    tog.textContent = '▼';
  } else {
    body.classList.add('hidden');
    tog.textContent = '▶';
  }
}

function saveInput(w, d, e, s, type, el) {
  saveVal(w, d, e, s, type, el.value);
  if (el.value) el.classList.add('filled');
  else el.classList.remove('filled');
  renderProgress();
}

function toggleDone(w, d, e, s, el) {
  const cur = loadVal(w, d, e, s, 'done');
  const next = cur ? '' : '✓';
  saveVal(w, d, e, s, 'done', next);
  el.value = next;
  if (next) el.classList.add('filled');
  else el.classList.remove('filled');
}

function completeDay(w, d) {
  const cur = localStorage.getItem(`w${w}_d${d}_done`);
  if (cur === '1') {
    localStorage.removeItem(`w${w}_d${d}_done`);
  } else {
    localStorage.setItem(`w${w}_d${d}_done`, '1');
  }
  render();
}

function openExPicker(dayIndex, exIndex) {
  pendingExChange = { dayIndex, exIndex };
  document.getElementById('exercisePickerModal').querySelector('.modal-title').textContent = 'HAREKETİ DEĞİŞTİR';
  document.getElementById('exSearchInput').value = '';
  renderExLibrary('');
  document.getElementById('exercisePickerModal').classList.remove('hidden');
  setTimeout(() => document.getElementById('exSearchInput').focus(), 50);
}
function openAddExercise(dayIndex) {
  pendingExChange = { dayIndex, exIndex: -1 };
  document.getElementById('exercisePickerModal').querySelector('.modal-title').textContent = 'HAREKETİ EKLE';
  document.getElementById('exSearchInput').value = '';
  renderExLibrary('');
  document.getElementById('exercisePickerModal').classList.remove('hidden');
  setTimeout(() => document.getElementById('exSearchInput').focus(), 50);
}
function closeExModal() {
  document.getElementById('exercisePickerModal').classList.add('hidden');
  pendingExChange = null;
}
function renderExLibrary(query) {
  let html = '';
  EXERCISE_LIBRARY.forEach(cat => {
    const filtered = query ? cat.exercises.filter(n => n.toLowerCase().includes(query)) : cat.exercises;
    if (!filtered.length) return;
    html += `<div class="ex-library-group"><div class="ex-library-group-title">${cat.group}</div>`;
    filtered.forEach(name => {
      html += `<div class="ex-library-item" onclick="selectExercise('${name.replace(/'/g,"\\'")}')">${name}</div>`;
    });
    html += `</div>`;
  });
  if (!html) html = `<div style="color:var(--muted);padding:20px;text-align:center">Sonuç bulunamadı</div>`;
  document.getElementById('exLibraryList').innerHTML = html;
}
function selectExercise(newName) {
  if (!pendingExChange) return;
  const { dayIndex, exIndex } = pendingExChange;
  const copy = JSON.parse(JSON.stringify(getActiveProgram()));
  if (exIndex === -1) {
    copy.days[dayIndex].exercises.push({ name: newName, sets: 3, reps: '10-12', note: '' });
  } else {
    copy.days[dayIndex].exercises[exIndex].name = newName;
  }
  saveCustomProgram(copy);
  closeExModal();
  renderContent();
  renderProgress();
  showToast(exIndex === -1 ? '"' + newName + '" eklendi' : '"' + newName + '" atandı');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function deleteExercise(dayIndex, exIndex) {
  if (!confirm('Bu hareketi silmek istediğine emin misin?')) return;
  const copy = JSON.parse(JSON.stringify(getActiveProgram()));
  copy.days[dayIndex].exercises.splice(exIndex, 1);
  saveCustomProgram(copy);
  renderContent();
  renderProgress();
  showToast('Hareket silindi');
}

function changeSetCount(dayIndex, exIndex, delta) {
  const copy = JSON.parse(JSON.stringify(getActiveProgram()));
  copy.days[dayIndex].exercises[exIndex].sets = Math.max(1, copy.days[dayIndex].exercises[exIndex].sets + delta);
  saveCustomProgram(copy);
  renderContent();
  renderProgress();
}

function isPR(d, e, s, val) {
  const v = parseFloat(val);
  if (!v) return false;
  for (let w2 = 0; w2 < 4; w2++) {
    if (w2 === currentWeek) continue;
    const prev = parseFloat(loadVal(w2, d, e, s, 'kg'));
    if (prev >= v) return false;
  }
  return true;
}

function saveDayNote(w, d, val) {
  localStorage.setItem(`w${w}_d${d}_note`, val);
}
function loadDayNote(w, d) {
  return localStorage.getItem(`w${w}_d${d}_note`) || '';
}

function saveWeightHistory(kg) {
  const history = JSON.parse(localStorage.getItem('weight_history') || '[]');
  const today = new Date().toISOString().split('T')[0];
  const idx = history.findIndex(e => e.date === today);
  if (idx >= 0) history[idx].kg = kg;
  else history.push({ date: today, kg });
  if (history.length > 12) history.splice(0, history.length - 12);
  localStorage.setItem('weight_history', JSON.stringify(history));
}
function openWeightHistory() {
  const history = JSON.parse(localStorage.getItem('weight_history') || '[]');
  const modal = document.getElementById('weightHistoryModal');
  const container = document.getElementById('weightChartContainer');
  if (!history.length) {
    container.innerHTML = '<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px">Henüz kilo geçmişi yok.<br>Kilo bilgisine tıklayarak ekleyebilirsin.</div>';
  } else {
    const max = Math.max(...history.map(e => e.kg));
    const min = Math.min(...history.map(e => e.kg));
    const range = max - min || 1;
    let html = '<div class="weight-chart-wrap">';
    history.forEach(e => {
      const h = Math.max(4, Math.round(((e.kg - min) / range) * 60) + 10);
      const dateLabel = e.date.slice(5);
      html += `<div class="wc-col">
        <div class="wc-val">${e.kg}</div>
        <div class="wc-bar" style="height:${h}px"></div>
        <div class="wc-label">${dateLabel}</div>
      </div>`;
    });
    html += '</div>';
    container.innerHTML = html;
  }
  modal.classList.remove('hidden');
}
function closeWeightHistory() {
  document.getElementById('weightHistoryModal').classList.add('hidden');
}

function getUserWeight() {
  return localStorage.getItem('user_weight') || '70';
}
function editWeight() {
  const cur = getUserWeight();
  const label = document.getElementById('weightLabel');
  label.innerHTML = '';
  const inp = document.createElement('input');
  inp.type = 'number';
  inp.value = cur;
  inp.style.cssText = 'width:56px;background:var(--surface);border:1px solid var(--accent);border-radius:4px;color:var(--text);font-family:"DM Sans",sans-serif;font-size:13px;padding:2px 6px;text-align:center;-moz-appearance:textfield;';
  const suffix = document.createTextNode(' kg · 4 Haftalık Program');
  label.appendChild(inp);
  label.appendChild(suffix);
  inp.focus(); inp.select();
  function save() {
    const val = parseInt(inp.value) || parseInt(cur);
    localStorage.setItem('user_weight', val);
    saveWeightHistory(val);
    label.textContent = val + ' kg · 4 Haftalık Program';
    label.onclick = editWeight;
  }
  inp.onblur = save;
  inp.onkeydown = e => {
    if (e.key === 'Enter') inp.blur();
    if (e.key === 'Escape') { label.textContent = cur + ' kg · 4 Haftalık Program'; label.onclick = editWeight; }
  };
}


function render() {
  renderWeekTabs();
  renderStats();
  document.getElementById('weekNote').textContent = getActiveProgram().weeks[currentWeek].note;
  document.getElementById('weightLabel').textContent = getUserWeight() + ' kg · 4 Haftalık Program';
  renderDayTabs();
  renderContent();
  renderProgress();
}

render();
</script>

<div id="weightHistoryModal" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-title">KİLO GEÇMİŞİ</div>
    <div id="weightChartContainer"></div>
    <button onclick="closeWeightHistory()" style="padding:10px;border:1px solid var(--border);border-radius:4px;background:none;color:var(--muted);font-family:'Bebas Neue',sans-serif;font-size:16px;cursor:pointer;letter-spacing:1px">KAPAT</button>
  </div>
</div>

<div id="exercisePickerModal" class="modal-overlay hidden">
  <div class="modal-box modal-box--wide">
    <div class="modal-title">HAREKETİ DEĞİŞTİR</div>
    <input id="exSearchInput" class="modal-input" type="text" placeholder="Ara..." oninput="renderExLibrary(this.value.trim().toLowerCase())">
    <div id="exLibraryList" class="ex-library-list"></div>
    <button onclick="closeExModal()" style="padding:10px;border:1px solid var(--border);border-radius:4px;background:none;color:var(--muted);font-family:'Bebas Neue',sans-serif;font-size:16px;cursor:pointer;letter-spacing:1px">KAPAT</button>
  </div>
</div>

<div id="toast" class="toast"></div>
</body>
</html>
